version: "3.8"

services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam

      # внешний адрес сервера
      - SERVERURL=vpn.example.com

      # порт WireGuard
      - SERVERPORT=51820

      # количество клиентов
      - PEERS=30

      # DNS для клиентов
      - PEERDNS=1.1.1.1

      # подсеть VPN
      - INTERNAL_SUBNET=10.13.13.0

      # разрешить доступ ко всему интернету через VPN
      - ALLOWEDIPS=0.0.0.0/0,::/0

    volumes:
      - ./config:/config
      - /lib/modules:/lib/modules:ro

    ports:
      - "51820:51820/udp"

    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1

    restart: unless-stopped
